spring.application.name=jwt-auth-core

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/temp?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=455445
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=MySuperSecureSecretKeyForJwt1234567890
app.jwt.access-token-expiration=3600000